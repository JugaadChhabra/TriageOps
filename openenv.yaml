spec_version: 1
name: triageops
description: "TriageOps — AI Customer Support Ops: triage and resolve tickets under SLA pressure"
version: "1.0.0"
author: "Pied Piper (Muaaz Shaikh, Mantek Singh Burn, Jugaad Chhabra)"
type: space
runtime: fastapi
app: server.app:app
port: 8000

tags:
  - openenv
  - reinforcement-learning
  - customer-support
  - multi-objective
  - triage

# ── Tasks ─────────────────────────────────────────────────────────────────
tasks:
  - name: ticket_classification
    description: "Easy: classify 10 tickets by routing to correct department or resolving with category-appropriate responses"
    config_path: server/tasks/task1.json
  - name: triage_prioritize
    description: "Medium: triage 20 mixed-urgency tickets with limited capacity, prioritize P0/P1 first"
    config_path: server/tasks/task2.json
  - name: full_resolution
    description: "Hard: 50+ streaming tickets — classify, prioritize, respond, detect duplicates, escalate under time pressure with VIP customers and department outages"
    config_path: server/tasks/task3.json

# ── Action / Observation / State (canonical models in /models.py) ─────────
models:
  - models  # root-level models.py with TriageAction, TriageObservation, TriageState

action_space:
  model: models.TriageAction
  description: "respond | escalate | defer | merge a ticket from the queue"

observation_space:
  model: models.TriageObservation
  description: "Ticket queue, capacity, department status, SLA warnings, running score"

state_space:
  model: models.TriageState
  description: "Episode metadata: step_count, total_reward, normalized_reward, grade breakdown"

reward_space:
  type: number
  description: "Dense per-action reward (positive for correct actions, negative for invalid/breached)"
  range: [-5.0, 10.0]
